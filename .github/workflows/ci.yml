# CI del monorepo. La regla del proyecto: falla si hay warnings (sección 13).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile
      - name: Validar esquema Prisma
        run: pnpm --filter @plataforma/database validate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/ci
      - name: Lint (falla con warnings)
        run: pnpm lint
      - name: Formato
        run: pnpm format:check
      - name: Pruebas
        run: pnpm test
