# Infraestructura de desarrollo local (instrucciones sección 4).
# Levantar con: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: pagos_postgres
    environment:
      POSTGRES_USER: plataforma
      POSTGRES_PASSWORD: plataforma_dev
      POSTGRES_DB: pagos_escolares
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U plataforma -d pagos_escolares']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pagos_redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: pagos_mailhog
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  pgdata:
